{% extends "base.html" %}
{% block title %}퀀텀 팔로워 세팅 — SNS킵{% endblock %}

{% block content %}
<div class="toss-page-header">
    <h1 class="toss-page-title">퀀텀 팔로워 세팅</h1>
</div>

<!-- 입력 영역 -->
<div class="toss-card">
    <div class="toss-card-header">사용자명 입력</div>
    <div style="display:flex; gap:12px;">
        <div style="flex:1;">
            <textarea id="usernameText" class="toss-input" rows="6"
                      style="font-family:'Consolas','Monaco',monospace; font-size:14px; resize:vertical;"
                      placeholder="한 줄에 아이디 하나씩 입력&#10;예: username1&#10;    username2&#10;    username3"></textarea>
        </div>
        <div style="display:flex; flex-direction:column; gap:8px; min-width:150px;">
            <button class="toss-btn toss-btn-secondary" onclick="fetchOrders()">대기 주문 불러오기</button>
            <label class="toss-btn toss-btn-secondary" style="margin:0; cursor:pointer;">
                이력 불러오기 (CSV)
                <input type="file" id="csvFile" accept=".csv" style="display:none" onchange="importHistory(this)">
            </label>
        </div>
    </div>
    <div style="display:flex; align-items:center; gap:16px; padding-top:16px;">
        <button id="startBtn" class="toss-btn toss-btn-primary" style="padding:14px 32px; font-size:16px;" onclick="startScrape()">추출 시작</button>
        <span id="statusText" style="font-size:14px; color:var(--gray-500); font-weight:500;">대기 중</span>
    </div>
</div>

<!-- 프로그레스 -->
<div id="progress" style="height:4px; background:var(--gray-100); border-radius:2px; overflow:hidden; display:none; margin-bottom:20px;">
    <div style="height:100%; background:var(--blue); border-radius:2px; width:40%; animation:indeterminate 1.5s ease-in-out infinite;"></div>
</div>

<!-- 결과 -->
<div id="resultCard" class="toss-card" style="display:none;">
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:16px;">
        <div id="summaryText" style="font-size:14px; color:var(--gray-600); font-weight:500;"></div>
        <div style="display:flex; gap:8px;">
            <button class="toss-btn toss-btn-secondary toss-btn-sm" onclick="copyAll()">전체 복사</button>
            <button id="superapBtn" class="toss-btn toss-btn-primary toss-btn-sm" onclick="registerSuperap()">superap 캠페인 등록</button>
        </div>
    </div>
    <div class="toss-table-wrap">
        <table class="toss-table">
            <thead>
                <tr>
                    <th>구분</th>
                    <th>인스타 아이디</th>
                    <th>이름</th>
                    <th>정답</th>
                    <th>수량</th>
                    <th>공개여부</th>
                    <th>캠페인</th>
                </tr>
            </thead>
            <tbody id="resultBody"></tbody>
        </table>
    </div>
</div>

<!-- 캠페인 설정 -->
<div class="toss-card" id="campaignSettingsCard">
    <div style="display:flex; align-items:center; justify-content:space-between; cursor:pointer;" onclick="toggleSettings()">
        <div class="toss-card-header" style="margin:0;">캠페인 설정</div>
        <span id="settingsToggle" style="font-size:18px; color:var(--gray-400); transition:transform .2s;">&#9660;</span>
    </div>
    <div id="settingsBody" style="display:none; padding-top:16px;">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px 20px;">
            <div style="grid-column:1/-1;">
                <label style="font-size:13px; font-weight:600; color:var(--gray-600); margin-bottom:4px; display:block;">캠페인 제목 템플릿</label>
                <input type="text" id="s_title_template" class="toss-input" placeholder="{username}은 아이디로 치환됩니다">
            </div>
            <div style="grid-column:1/-1;">
                <label style="font-size:13px; font-weight:600; color:var(--gray-600); margin-bottom:4px; display:block;">상품설명 <span style="font-weight:400; color:var(--gray-400);">(비워두면 API 기본값)</span></label>
                <textarea id="s_description" class="toss-input" rows="3" style="resize:vertical;"></textarea>
            </div>
            <div>
                <label style="font-size:13px; font-weight:600; color:var(--gray-600); margin-bottom:4px; display:block;">수량 배수</label>
                <input type="number" id="s_budget_multiplier" class="toss-input" step="0.1" min="1">
            </div>
            <div>
                <label style="font-size:13px; font-weight:600; color:var(--gray-600); margin-bottom:4px; display:block;">캠페인 기간 (일)</label>
                <input type="number" id="s_duration_days" class="toss-input" min="1">
            </div>
            <div>
                <label style="font-size:13px; font-weight:600; color:var(--gray-600); margin-bottom:4px; display:block;">지역</label>
                <input type="text" id="s_geo" class="toss-input">
            </div>
            <div>
                <label style="font-size:13px; font-weight:600; color:var(--gray-600); margin-bottom:4px; display:block;">이벤트 제한</label>
                <input type="text" id="s_event_limit" class="toss-input">
            </div>
            <div style="grid-column:1/-1;">
                <div style="display:flex; align-items:center; gap:12px; margin-bottom:6px;">
                    <label style="font-size:13px; font-weight:600; color:var(--gray-600); margin:0;">매체 타겟팅</label>
                    <span id="mediaSelectAll" style="font-size:12px; color:var(--blue); cursor:pointer; font-weight:500;">전체 선택</span>
                    <span id="mediaDeselectAll" style="font-size:12px; color:var(--gray-400); cursor:pointer; font-weight:500;">전체 해제</span>
                </div>
                <div id="s_media_container" style="display:flex; flex-wrap:wrap; gap:6px 14px; padding:10px 12px; border:1px solid var(--gray-200); border-radius:8px; background:var(--gray-50);">
                    <span style="font-size:13px; color:var(--gray-400);">로딩 중...</span>
                </div>
            </div>
            <div style="grid-column:1/-1;">
                <label style="font-size:13px; font-weight:600; color:var(--gray-600); margin-bottom:4px; display:block;">가로 소재 이미지 URL (1200x600) <span style="font-weight:400; color:var(--gray-400);">(비워두면 기본 이미지)</span></label>
                <div style="display:flex; gap:8px; align-items:center;">
                    <input type="text" id="s_img1_url" class="toss-input" style="flex:1;" placeholder="https://webapp.superap.io/res/insta_follow_1200-600.png" oninput="updateImagePreview('s_img1_url','s_img1_preview')">
                    <img id="s_img1_preview" src="" style="height:40px; border-radius:4px; border:1px solid var(--gray-200); display:none;">
                </div>
            </div>
            <div style="grid-column:1/-1;">
                <label style="font-size:13px; font-weight:600; color:var(--gray-600); margin-bottom:4px; display:block;">세로 소재 이미지 URL (720x780) <span style="font-weight:400; color:var(--gray-400);">(비워두면 기본 이미지)</span></label>
                <div style="display:flex; gap:8px; align-items:center;">
                    <input type="text" id="s_img2_url" class="toss-input" style="flex:1;" placeholder="https://webapp.superap.io/res/insta_follow_720-780.png" oninput="updateImagePreview('s_img2_url','s_img2_preview')">
                    <img id="s_img2_preview" src="" style="height:40px; border-radius:4px; border:1px solid var(--gray-200); display:none;">
                </div>
            </div>
        </div>
        <div style="padding-top:16px; text-align:right;">
            <button class="toss-btn toss-btn-primary toss-btn-sm" onclick="saveCampaignSettings()">설정 저장</button>
        </div>
    </div>
</div>

<!-- superap 결과 -->
<div id="superapResultCard" class="toss-card" style="display:none;">
    <div class="toss-card-header">superap.io 캠페인 등록 결과</div>
    <div id="superapSummary" style="font-size:14px; color:var(--gray-600); font-weight:500; margin-bottom:12px;"></div>
    <div class="toss-table-wrap">
        <table class="toss-table">
            <thead>
                <tr>
                    <th>구분</th>
                    <th>인스타 아이디</th>
                    <th>결과</th>
                    <th>메시지</th>
                </tr>
            </thead>
            <tbody id="superapResultBody"></tbody>
        </table>
    </div>
</div>

<!-- 토스트 -->
<div id="toast" style="position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px); background:var(--gray-900); color:#fff; padding:12px 24px; border-radius:8px; font-size:14px; font-weight:500; opacity:0; transition:all .3s ease; z-index:1000; pointer-events:none;"></div>

<style>
@keyframes indeterminate {
    0%   { transform: translateX(-100%); }
    100% { transform: translateX(350%); }
}
.row-new      { background: var(--green-light) !important; }
.row-new:hover { background: #d1f4dd !important; }
.row-extend      { background: var(--orange-light) !important; }
.row-extend:hover { background: #fff0cc !important; }
.toss-table tbody td { cursor: pointer; transition: background 0.1s; }
.toss-table tbody td.copied { background: var(--blue-light) !important; transition: background 0s; }
.superap-ok { color: var(--green); font-weight: 600; }
.superap-fail { color: var(--red, #e53e3e); font-weight: 600; }
</style>
{% endblock %}

{% block scripts %}
<script>
let quantityMap = {};
let linkMap = {};

function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.style.opacity = '1';
    el.style.transform = 'translateX(-50%) translateY(0)';
    setTimeout(() => {
        el.style.opacity = '0';
        el.style.transform = 'translateX(-50%) translateY(80px)';
    }, 2000);
}

function setStatus(msg) {
    document.getElementById('statusText').textContent = msg;
}

function setLoading(on) {
    document.getElementById('progress').style.display = on ? 'block' : 'none';
    document.getElementById('startBtn').disabled = on;
    const superapBtn = document.getElementById('superapBtn');
    if (superapBtn) superapBtn.disabled = on;
}

function parseUsernames() {
    const raw = document.getElementById('usernameText').value.trim();
    if (!raw) return [];
    const usernames = [];
    for (const line of raw.split('\n')) {
        for (let part of line.split(',')) {
            part = part.trim().replace(/^@/, '');
            if (part) usernames.push(part);
        }
    }
    return usernames;
}

function esc(str) {
    const d = document.createElement('div');
    d.textContent = str || '';
    return d.innerHTML;
}

// ── 대기 주문 불러오기 ──

async function fetchOrders() {
    setLoading(true);
    setStatus('대기 주문 불러오는 중...');
    try {
        const resp = await fetch('{{ url_for("admin.api_fetch_orders") }}', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({})
        });
        const data = await resp.json();
        if (!data.ok) { showToast(data.error || '실패'); setStatus('오류 발생'); return; }
        if (!data.orders.length) { setStatus('대기 중인 주문이 없습니다.'); return; }

        quantityMap = {};
        linkMap = {};
        const names = [];
        for (const o of data.orders) {
            quantityMap[o.username] = o['수량'];
            names.push(o.username);
        }
        document.getElementById('usernameText').value = names.join('\n');
        setStatus(`대기 주문 ${data.orders.length}건 불러옴 — '추출 시작'을 눌러주세요`);
    } catch (e) {
        showToast('네트워크 오류: ' + e.message);
        setStatus('오류 발생');
    } finally {
        setLoading(false);
    }
}

// ── 이력 불러오기 (CSV) ──

async function importHistory(input) {
    const file = input.files[0];
    if (!file) return;
    input.value = '';
    const form = new FormData();
    form.append('file', file);
    setLoading(true);
    setStatus('이력 불러오는 중...');
    try {
        const resp = await fetch('{{ url_for("admin.api_import_history") }}', {method: 'POST', body: form});
        const data = await resp.json();
        if (!data.ok) { showToast(data.error || '실패'); setStatus('오류 발생'); return; }
        const total = data.new_count + data.update_count;
        showToast(`이력 불러오기 완료 — 총 ${total}건 (신규 ${data.new_count}, 업데이트 ${data.update_count})`);
        setStatus(`이력 불러오기 완료 — 신규 ${data.new_count}건, 업데이트 ${data.update_count}건`);
    } catch (e) {
        showToast('네트워크 오류: ' + e.message);
        setStatus('오류 발생');
    } finally {
        setLoading(false);
    }
}

// ── 추출 시작 ──

async function startScrape() {
    const usernames = parseUsernames();
    if (!usernames.length) { showToast('추출할 사용자명을 입력하세요.'); return; }

    setLoading(true);
    setStatus(`${usernames.length}개 프로필 추출 중...`);
    document.getElementById('resultCard').style.display = 'none';
    document.getElementById('superapResultCard').style.display = 'none';

    try {
        const resp = await fetch('{{ url_for("admin.api_scrape_profiles") }}', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({usernames, quantity_map: quantityMap})
        });
        const data = await resp.json();
        if (!data.ok) { showToast(data.error || '추출 실패'); setStatus('오류 발생'); return; }
        renderResults(data.results);
        setStatus(`완료 — ${data.results.length}건 추출됨`);
    } catch (e) {
        showToast('네트워크 오류: ' + e.message);
        setStatus('오류 발생');
    } finally {
        setLoading(false);
    }
}

// ── 결과 렌더링 ──

function renderResults(results) {
    const card = document.getElementById('resultCard');
    const body = document.getElementById('resultBody');
    body.innerHTML = '';
    if (!results.length) { card.style.display = 'none'; return; }

    let newCount = 0, extCount = 0;
    for (const r of results) {
        const tr = document.createElement('tr');
        if (r['구분'] === '신규') { tr.className = 'row-new'; newCount++; }
        else { tr.className = 'row-extend'; extCount++; }

        const badge = r['구분'] === '신규'
            ? '<span class="toss-badge toss-badge-success">신규</span>'
            : '<span class="toss-badge toss-badge-warning">캠페인 연장</span>';
        const privBadge = r['비공개'] === '비공개'
            ? '<span class="toss-badge toss-badge-muted">비공개</span>'
            : '<span class="toss-badge toss-badge-success">공개</span>';

        tr.innerHTML = `
            <td>${badge}</td>
            <td>${esc(r.username)}</td>
            <td>${esc(r.fullName)}</td>
            <td>${esc(r['정답'])}</td>
            <td>${esc(r['수량'] || '')}</td>
            <td>${privBadge}</td>
            <td><span class="toss-badge toss-badge-muted">대기</span></td>`;

        tr.querySelectorAll('td').forEach(td => {
            td.addEventListener('click', () => {
                const text = td.textContent.trim();
                navigator.clipboard.writeText(text);
                td.classList.add('copied');
                setTimeout(() => td.classList.remove('copied'), 300);
                showToast('복사됨: ' + text);
            });
        });
        body.appendChild(tr);
    }

    document.getElementById('summaryText').innerHTML =
        `총 <strong>${results.length}</strong>건 &nbsp;|&nbsp; 신규 <strong>${newCount}</strong>건 &nbsp;|&nbsp; 캠페인 연장 <strong>${extCount}</strong>건`;
    card.style.display = 'block';
    card._results = results;
}

// ── superap.io 캠페인 등록 ──

async function registerSuperap() {
    const card = document.getElementById('resultCard');
    const results = card._results;
    if (!results || !results.length) {
        showToast('먼저 프로필 추출을 실행하세요.');
        return;
    }

    if (!confirm(`${results.length}건의 캠페인을 superap.io에 등록하시겠습니까?`)) return;

    setLoading(true);
    setStatus(`superap.io에 ${results.length}건 캠페인 등록 중...`);

    const orders = results.map(r => ({
        username: r.username,
        quantity: parseInt(r['수량']) || 0,
        link: `https://www.instagram.com/${r.username}/`,
        answer: r['정답'] || '',
    }));

    try {
        const resp = await fetch('{{ url_for("admin.api_superap_register") }}', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({orders})
        });
        const data = await resp.json();
        if (!data.ok) { showToast(data.error || '등록 실패'); setStatus('오류 발생'); return; }

        renderSuperapResults(data.results);
        setStatus(`superap 등록 완료 — 성공 ${data.success_count}건, 실패 ${data.fail_count}건`);

        // 결과 테이블의 캠페인 컬럼 업데이트
        updateCampaignStatus(data.results);

    } catch (e) {
        showToast('네트워크 오류: ' + e.message);
        setStatus('오류 발생');
    } finally {
        setLoading(false);
    }
}

function renderSuperapResults(results) {
    const card = document.getElementById('superapResultCard');
    const body = document.getElementById('superapResultBody');
    body.innerHTML = '';

    let okCount = 0, failCount = 0;
    for (const r of results) {
        const tr = document.createElement('tr');
        if (r.ok) { okCount++; tr.className = 'row-new'; }
        else { failCount++; }

        const badge = r['구분'] === '신규'
            ? '<span class="toss-badge toss-badge-success">신규</span>'
            : '<span class="toss-badge toss-badge-warning">연장</span>';
        const statusBadge = r.ok
            ? '<span class="superap-ok">성공</span>'
            : '<span class="superap-fail">실패</span>';

        tr.innerHTML = `
            <td>${badge}</td>
            <td>${esc(r.username)}</td>
            <td>${statusBadge}</td>
            <td>${esc(r.message)}</td>`;
        body.appendChild(tr);
    }

    document.getElementById('superapSummary').innerHTML =
        `성공 <strong>${okCount}</strong>건 &nbsp;|&nbsp; 실패 <strong>${failCount}</strong>건`;
    card.style.display = 'block';
}

function updateCampaignStatus(superapResults) {
    const rows = document.getElementById('resultBody').querySelectorAll('tr');
    const statusMap = {};
    for (const r of superapResults) {
        statusMap[r.username] = r.ok;
    }

    rows.forEach(row => {
        const usernameTd = row.querySelectorAll('td')[1];
        const campaignTd = row.querySelectorAll('td')[6];
        if (!usernameTd || !campaignTd) return;

        const username = usernameTd.textContent.trim();
        if (username in statusMap) {
            campaignTd.innerHTML = statusMap[username]
                ? '<span class="toss-badge toss-badge-success">등록완료</span>'
                : '<span class="toss-badge toss-badge-danger">등록실패</span>';
        }
    });
}

// ── 전체 복사 ──

function copyAll() {
    const card = document.getElementById('resultCard');
    const results = card._results;
    if (!results || !results.length) return;
    const lines = ['구분\t인스타아이디\t이름\t정답\t수량\t공개여부'];
    for (const r of results) {
        lines.push([r['구분'], r.username, r.fullName, r['정답'], r['수량'] || '', r['비공개'] || ''].join('\t'));
    }
    navigator.clipboard.writeText(lines.join('\n'));
    showToast(`전체 ${results.length}건 클립보드에 복사됨`);
}

// ── 캠페인 설정 ──

function toggleSettings() {
    const body = document.getElementById('settingsBody');
    const toggle = document.getElementById('settingsToggle');
    if (body.style.display === 'none') {
        body.style.display = 'block';
        toggle.style.transform = 'rotate(180deg)';
    } else {
        body.style.display = 'none';
        toggle.style.transform = 'rotate(0deg)';
    }
}

function updateImagePreview(inputId, previewId) {
    const url = document.getElementById(inputId).value.trim();
    const img = document.getElementById(previewId);
    if (url) {
        img.src = url;
        img.style.display = 'block';
        img.onerror = () => { img.style.display = 'none'; };
    } else {
        img.style.display = 'none';
    }
}

let _allPublishers = [];

async function loadPublishers(savedIds) {
    const container = document.getElementById('s_media_container');
    try {
        const resp = await fetch('{{ url_for("admin.api_superap_publishers") }}');
        const data = await resp.json();
        if (!data.ok || !data.publishers.length) {
            container.innerHTML = '<span style="font-size:13px; color:var(--gray-400);">매체 목록 없음</span>';
            return;
        }
        _allPublishers = data.publishers;
        const savedSet = new Set((savedIds || []).map(String));
        // savedIds가 비어있으면 전체 선택 (기본 동작)
        const selectAll = savedSet.size === 0;

        container.innerHTML = _allPublishers.map(p => {
            const checked = selectAll || savedSet.has(String(p.value)) ? 'checked' : '';
            return `<label style="font-size:13px; display:flex; align-items:center; gap:4px; cursor:pointer; white-space:nowrap;">
                <input type="checkbox" class="media-cb" value="${p.value}" ${checked}> ${esc(p.name)}
            </label>`;
        }).join('');
    } catch (e) {
        container.innerHTML = '<span style="font-size:13px; color:var(--red, #e53e3e);">로드 실패</span>';
    }
}

function getSelectedMediaIds() {
    return Array.from(document.querySelectorAll('.media-cb:checked')).map(cb => Number(cb.value));
}

async function loadCampaignSettings() {
    try {
        const resp = await fetch('{{ url_for("admin.api_get_campaign_settings") }}');
        const data = await resp.json();
        document.getElementById('s_title_template').value = data.title_template || '';
        document.getElementById('s_description').value = data.description || '';
        document.getElementById('s_budget_multiplier').value = data.budget_multiplier ?? 1.2;
        document.getElementById('s_duration_days').value = data.duration_days ?? 30;
        document.getElementById('s_geo').value = data.geo || 'kr';
        document.getElementById('s_event_limit').value = data.event_limit || '1';
        document.getElementById('s_img1_url').value = data.img1_url || '';
        document.getElementById('s_img2_url').value = data.img2_url || '';
        updateImagePreview('s_img1_url', 's_img1_preview');
        updateImagePreview('s_img2_url', 's_img2_preview');
        await loadPublishers(data.target_media_ids || []);
    } catch (e) {
        console.error('캠페인 설정 로드 실패:', e);
    }
}

async function saveCampaignSettings() {
    const settings = {
        title_template: document.getElementById('s_title_template').value,
        description: document.getElementById('s_description').value,
        budget_multiplier: parseFloat(document.getElementById('s_budget_multiplier').value) || 1.2,
        duration_days: parseInt(document.getElementById('s_duration_days').value) || 30,
        geo: document.getElementById('s_geo').value || 'kr',
        event_limit: document.getElementById('s_event_limit').value || '1',
        img1_url: document.getElementById('s_img1_url').value.trim(),
        img2_url: document.getElementById('s_img2_url').value.trim(),
        target_media_ids: getSelectedMediaIds(),
    };

    try {
        const resp = await fetch('{{ url_for("admin.api_save_campaign_settings") }}', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(settings)
        });
        const data = await resp.json();
        if (data.ok) {
            showToast('캠페인 설정이 저장되었습니다.');
            updateImagePreview('s_img1_url', 's_img1_preview');
            updateImagePreview('s_img2_url', 's_img2_preview');
        } else {
            showToast('저장 실패: ' + (data.error || '알 수 없는 오류'));
        }
    } catch (e) {
        showToast('네트워크 오류: ' + e.message);
    }
}

// 매체 전체 선택/해제
document.getElementById('mediaSelectAll').addEventListener('click', () => {
    document.querySelectorAll('.media-cb').forEach(cb => cb.checked = true);
});
document.getElementById('mediaDeselectAll').addEventListener('click', () => {
    document.querySelectorAll('.media-cb').forEach(cb => cb.checked = false);
});

// 페이지 로드 시 설정 불러오기
loadCampaignSettings();
</script>
{% endblock %}
