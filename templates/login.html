<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNS킵 관리자 로그인</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
</head>
<body>
    <div class="toss-login-wrap">
        <div class="toss-card" style="width: 100%; max-width: 400px;">
            <div style="text-align: center; margin-bottom: 32px;">
                <h1 style="font-size: 24px; font-weight: 700; color: var(--gray-900); margin: 0 0 8px;">SNS킵</h1>
                <p style="font-size: 15px; color: var(--gray-500); margin: 0;">관리자 로그인</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="toss-alert toss-alert-{{ category }}" style="margin-bottom: 20px;">
                {{ message }}
            </div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('admin.login') }}">
                <div class="toss-form-group">
                    <label class="toss-label" for="username">아이디</label>
                    <input type="text" class="toss-input" id="username" name="username"
                           placeholder="아이디를 입력하세요" required autofocus>
                </div>
                <div class="toss-form-group">
                    <label class="toss-label" for="password">비밀번호</label>
                    <input type="password" class="toss-input" id="password" name="password"
                           placeholder="비밀번호를 입력하세요" required>
                </div>
                <button type="submit" class="toss-btn toss-btn-primary" style="width: 100%; padding: 14px; font-size: 16px;">
                    로그인
                </button>
            </form>
        </div>
    </div>
</body>
</html>
