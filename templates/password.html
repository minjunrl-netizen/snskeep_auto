{% extends "base.html" %}
{% block title %}비밀번호 변경 - SNS킵 관리자{% endblock %}

{% block content %}
<div class="toss-page-header">
    <h1 class="toss-page-title">비밀번호 변경</h1>
</div>

<div class="toss-card" style="max-width: 480px;">
    <form method="POST" action="{{ url_for('admin.change_password') }}">
        <div class="toss-form-group">
            <label class="toss-label" for="current_password">현재 비밀번호</label>
            <input type="password" class="toss-input" id="current_password" name="current_password" required>
        </div>
        <div class="toss-form-group">
            <label class="toss-label" for="new_password">새 비밀번호</label>
            <input type="password" class="toss-input" id="new_password" name="new_password"
                   placeholder="6자 이상" required minlength="6">
        </div>
        <div class="toss-form-group">
            <label class="toss-label" for="confirm_password">새 비밀번호 확인</label>
            <input type="password" class="toss-input" id="confirm_password" name="confirm_password" required minlength="6">
        </div>
        <div style="display: flex; gap: 8px;">
            <button type="submit" class="toss-btn toss-btn-primary">변경</button>
            <a href="{{ url_for('admin.dashboard') }}" class="toss-btn toss-btn-secondary">취소</a>
        </div>
    </form>
</div>
{% endblock %}
